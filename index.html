<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>新增銷售紀錄</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Arial', sans-serif; padding: 20px; background-color: #f4f5f7; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;}
    .btn { width: 100%; padding: 12px; background: #00B900; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s;}
    .btn:active { transform: scale(0.98); }
    
    /* 載入動畫 */
    .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid #00B900; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="text-align: center; color: #333;">📦 新增銷售</h2>
    <form id="saleForm">
      <label>商品名稱 (可下拉或自填)</label>
      <input type="text" id="productName" list="productList" required placeholder="例如：拿鐵咖啡">
      <datalist id="productList">
        <option value="商品A">
        <option value="商品B">
      </datalist>

      <label>銷售數量</label>
      <input type="number" id="qty" value="1" min="1" required>

      <label>單件設定金額</label>
      <input type="number" id="price" required placeholder="自訂金額">

      <label>總折扣金額 (若無則填0)</label>
      <input type="number" id="discount" value="0" required>

      <div style="text-align: center; margin-top: 20px;">
        <button type="button" class="btn" id="submitBtn" onclick="submitData()">確認結帳</button>
        <div class="loader" id="loader"></div>
      </div>
    </form>
  </div>

  <script>
    let userProfile = {};

    // 1. 初始化 LIFF
    liff.init({ liffId: "2010757215-9etMXJlK" }).then(() => {
      if (liff.isLoggedIn()) {
        liff.getProfile().then(profile => { userProfile = profile; });
      } else {
        liff.login();
      }
    });

    // 2. 送出資料
    function submitData() {
      document.getElementById('submitBtn').style.display = 'none';
      document.getElementById('loader').style.display = 'block';

      const payload = {
        action: 'addSale',
        uid: userProfile.userId || 'test_uid',
        empName: userProfile.displayName || '員工',
        productName: document.getElementById('productName').value,
        qty: parseInt(document.getElementById('qty').value),
        price: parseInt(document.getElementById('price').value),
        discount: parseInt(document.getElementById('discount').value)
      };

      // 呼叫 GAS doPost
      fetch('你的_GAS_WebAPP_URL', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === 'success') {
          // 成功動畫或訊息
          alert(`✅ 結帳成功！總金額：${data.total} 元`);
          liff.closeWindow(); // 記帳完自動關閉 LIFF 視窗
        }
      });
    }
  </script>
</body>
</html>
