<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>紅木盒帳務系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* =========================================
       終極 3 倍放大版 CSS (專為 Full 螢幕/平板設計)
       ========================================= */
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #fbd6d2; height: 100vh; display: flex; flex-direction: column; color: #4a4a4a; }
    
    #status-bar { text-align: center; padding: 25px; background: #fff3cd; color: #856404; font-size: 28px; font-weight: bold; display: none; }
    
    /* 頂部分頁：超大點擊區塊 */
    .tabs { display: flex; background: #fbd6d2; padding-top: 15px; z-index: 10; flex-shrink: 0; }
    .tab { flex: 1; text-align: center; padding: 35px 0; font-weight: bold; color: #888; cursor: pointer; font-size: 38px; transition: 0.3s; border-bottom: 8px solid transparent; }
    
    #tab-sales.active { color: #d9534f; border-bottom-color: #d9534f; }
    #tab-restock.active { color: #4A90E2; border-bottom-color: #4A90E2; }
    #tab-stats.active { color: #9B59B6; border-bottom-color: #9B59B6; }
    
    /* 內容區塊 */
    .form-wrapper { flex: 1; overflow-y: auto; padding: 30px; padding-bottom: 80px; background: #fdf5f4; border-top-left-radius: 40px; border-top-right-radius: 40px; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
    .form-content { display: none; }
    .form-content.active { display: block; }
    
    /* 卡片設計終極加大 */
    .item-card { background: #fff; border-radius: 40px; padding: 40px; margin-bottom: 40px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); position: relative; }
    .remove-btn { position: absolute; top: 25px; right: 25px; background: #ffebee; color: #d32f2f; border: none; border-radius: 15px; padding: 18px 28px; font-size: 26px; font-weight: bold; cursor: pointer; }
    
    /* 標題與輸入框終極放大 */
    label { font-size: 32px; color: #666; font-weight: bold; margin-bottom: 20px; display: block; }
    #form-sales label { color: #d9534f; }
    #form-restock label { color: #4A90E2; }
    
    /* 輸入框與下拉選單 */
    input, select { width: 100%; padding: 35px; margin-bottom: 30px; border: none; border-radius: 30px; box-sizing: border-box; font-size: 42px; background: #fcede3; color: #333; font-weight: bold; }
    input:focus, select:focus { outline: 6px solid #f2b3a8; background: #fff; }
    
    #form-restock input, #form-restock select { background: #e8f0fe; }
    #form-restock input:focus, #form-restock select:focus { outline: 6px solid #abcbf6; background: #fff; }

    .row { display: flex; gap: 20px; }
    .col-product { flex: 1.8; } 
    .col-qty { flex: 1; }     
    
    /* 新增按鈕加大 */
    .add-row-btn { width: 100%; padding: 35px; background: transparent; border: 5px dashed; border-radius: 35px; font-size: 36px; font-weight: bold; margin-bottom: 40px; cursor: pointer; }
    #form-sales .add-row-btn { color: #d9534f; border-color: #f2b3a8; }
    #form-restock .add-row-btn { color: #4A90E2; border-color: #abcbf6; }

    .discount-box { background: #fff; border-radius: 40px; padding: 40px; margin-bottom: 40px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
    
    /* 結帳大按鈕 */
    .btn-submit { width: 100%; padding: 45px; color: white; border: none; border-radius: 40px; font-size: 48px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 8px 25px rgba(0,0,0,0.15); transition: 0.2s; }
    .btn-submit:active { transform: scale(0.97); }
    
    /* 報表區塊終極放大 */
    .stats-nav { display: flex; gap: 20px; margin-bottom: 40px; }
    .stats-btn { flex: 1; padding: 25px; border-radius: 25px; border: none; background: #f0e4f5; color: #9B59B6; font-size: 32px; font-weight: bold; cursor: pointer; transition: 0.3s;}
    .stats-btn.active { background: #9B59B6; color: #fff; }
    
    .chart-container { background: #fff; padding: 40px; border-radius: 40px; margin-bottom: 40px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); }
    
    /* 統計日期標題 */
    .stats-date-title { text-align: center; font-size: 36px; color: #9B59B6; font-weight: bold; margin-bottom: 30px; background: #f0e4f5; padding: 15px; border-radius: 20px;}
    
    .stats-summary { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .stats-summary div { text-align: center; width: 48%; }
    .stats-val { font-size: 65px; font-weight: bold; color: #9B59B6; line-height: 1.2; }
    .stats-title { font-size: 28px; color: #888; margin-top: 10px;}
    
    .chart-title { text-align: center; color: #666; margin-top: 0; font-size: 34px; margin-bottom: 30px; }
  </style>
</head>
<body>

  <div id="status-bar">🔄 系統初始化中...</div>

  <div class="tabs">
    <div class="tab active" id="tab-sales" onclick="switchTab('sales')">支出/銷售</div>
    <div class="tab" id="tab-restock" onclick="switchTab('restock')">進貨</div>
    <div class="tab" id="tab-stats" onclick="switchTab('stats')">📊 報表</div>
  </div>

  <div class="form-wrapper">
    <!-- 1. 銷售表單 -->
    <div class="form-content active" id="form-sales">
      <div id="sales-list">
        <div class="item-card sale-item">
          <div class="row">
            <div class="col-product">
              <label>商品名稱</label>
              <select class="s-name" onchange="autoFillPrice(this)"></select>
            </div>
            <div class="col-qty">
              <label>數量</label>
              <input type="number" class="s-qty" value="1" inputmode="numeric" oninput="calcTotal()">
            </div>
          </div>
          <label>金額</label>
          <input type="number" class="s-price" placeholder="輸入金額" inputmode="numeric" oninput="calcTotal()">
        </div>
      </div>
      <button class="add-row-btn" onclick="addSaleRow()">＋ 新增商品</button>
      <div class="discount-box">
        <label>折扣 (無則 0)</label>
        <input type="number" id="s-discount" value="0" inputmode="numeric" oninput="calcTotal()" style="margin-bottom:0;">
      </div>
      <button class="btn-submit" style="background:#d9534f;" onclick="submitSales()">
        <span id="sales-total-text">結帳 (總計 $0)</span>
      </button>
    </div>

    <!-- 2. 進貨表單 -->
    <div class="form-content" id="form-restock">
      <div id="restock-list">
        <div class="item-card restock-item">
          <div class="row">
            <div class="col-product">
              <label>進貨商品</label>
              <select class="r-name"></select>
            </div>
            <div class="col-qty">
              <label>數量</label>
              <input type="number" class="r-qty" value="1" inputmode="numeric" oninput="calcRestockTotal()">
            </div>
          </div>
          <label>進貨總成本</label>
          <input type="number" class="r-cost" placeholder="輸入總成本" inputmode="numeric" oninput="calcRestockTotal()">
        </div>
      </div>
      <button class="add-row-btn" onclick="addRestockRow()">＋ 新增進貨</button>
      <button class="btn-submit" style="background:#4A90E2;" onclick="submitRestock()">
        <span id="restock-total-text">儲存進貨 ($0)</span>
      </button>
    </div>

    <!-- 3. 統計報表表單 (升級版) -->
    <div class="form-content" id="form-stats">
      <div class="stats-nav">
        <button class="stats-btn active" onclick="loadStats('day', this)">日報表</button>
        <button class="stats-btn" onclick="loadStats('week', this)">週報表</button>
        <button class="stats-btn" onclick="loadStats('month', this)">月報表</button>
      </div>

      <div class="chart-container">
        <!-- 顯示動態日期範圍 -->
        <div class="stats-date-title" id="stats-date-display">載入中...</div>
        <div class="stats-summary">
          <div><div class="stats-val" id="st-revenue">$0</div><div class="stats-title">總營業額</div></div>
          <div><div class="stats-val" id="st-qty">0</div><div class="stats-title">售出總量</div></div>
        </div>
      </div>

      <!-- 新增：橫向百分比圖 -->
      <div class="chart-container">
        <h4 class="chart-title">銷售數量佔比 (%)</h4>
        <canvas id="horizontalBarChart"></canvas>
      </div>

      <div class="chart-container">
        <h4 class="chart-title">營業額佔比 (圓餅圖)</h4>
        <canvas id="pieChart"></canvas>
      </div>
      
      <div class="chart-container">
        <h4 class="chart-title">各品項銷售數量 (直條圖)</h4>
        <canvas id="barChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbycPaOiDloK_fn_S8RLs7bo-sTU3OCQSFI2pyYbwxZzW5y9KAjQ-NNx6Fsbo1hYuKSsVg/exec'; 
    let userProfile = {};
    let globalProducts = []; 
    let pieChartInstance = null;
    let barChartInstance = null;
    let horizontalBarChartInstance = null; // 新增橫條圖實例

    liff.init({ liffId: "2010757215-9etMXJlK" }).then(() => {
      if (liff.isLoggedIn()) { 
        liff.getProfile().then(profile => { 
          userProfile = profile; 
          initAppAndFetchProducts(); 
        }); 
      } else { liff.login(); }
    });

    function initAppAndFetchProducts() {
      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        redirect: 'follow',
        body: JSON.stringify({ action: 'initApp', uid: userProfile.userId, empName: userProfile.displayName })
      }).then(res => res.json()).then(res => {
        if (res.status === 'success') {
          globalProducts = res.products; 
          populateAllSelects(); 
        }
      });
    }

    function getOptionsHtml() {
      let html = '<option value="" disabled selected>請選擇...</option>';
      globalProducts.forEach(p => { html += `<option value="${p.name}">${p.name}</option>`; });
      return html;
    }

    function populateAllSelects() {
      const opts = getOptionsHtml();
      document.querySelectorAll('.s-name, .r-name').forEach(s => {
        if (s.options.length <= 1) s.innerHTML = opts;
      });
    }

    function autoFillPrice(selectElem) {
      const p = globalProducts.find(x => x.name === selectElem.value);
      if (p) { selectElem.closest('.item-card').querySelector('.s-price').value = p.price; calcTotal(); }
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));
      
      document.getElementById(`tab-${tabName}`).classList.add('active');
      document.getElementById(`form-${tabName}`).classList.add('active');

      if(tabName === 'stats') {
        loadStats('day', document.querySelector('.stats-btn'));
      }
    }

    function addSaleRow() {
      const html = `<div class="item-card sale-item"><button class="remove-btn" onclick="this.parentElement.remove(); calcTotal();">刪除</button><div class="row"><div class="col-product"><label>商品名稱</label><select class="s-name" onchange="autoFillPrice(this)">${getOptionsHtml()}</select></div><div class="col-qty"><label>數量</label><input type="number" class="s-qty" value="1" inputmode="numeric" oninput="calcTotal()"></div></div><label>金額</label><input type="number" class="s-price" placeholder="輸入單價" inputmode="numeric" oninput="calcTotal()"></div>`;
      document.getElementById('sales-list').insertAdjacentHTML('beforeend', html);
    }

    function calcTotal() {
      let total = 0;
      document.querySelectorAll('.sale-item').forEach(item => {
        total += (parseInt(item.querySelector('.s-qty').value) || 0) * (parseInt(item.querySelector('.s-price').value) || 0);
      });
      total -= (parseInt(document.getElementById('s-discount').value) || 0);
      document.getElementById('sales-total-text').innerText = `結帳 (總計 $${Math.max(0, total)})`;
    }

    function submitSales() {
      let items = [];
      document.querySelectorAll('.sale-item').forEach(item => {
        let name = item.querySelector('.s-name').value;
        let qty = parseInt(item.querySelector('.s-qty').value) || 0;
        let price = parseInt(item.querySelector('.s-price').value) || 0;
        if(name && qty > 0) items.push({ productName: name, qty: qty, price: price });
      });
      if (items.length === 0) return alert("請完整選擇商品！");
      document.getElementById('sales-total-text').innerText = "處理中...";
      
      fetch(GAS_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, redirect: 'follow',
        body: JSON.stringify({ action: 'addSale', uid: userProfile.userId, empName: userProfile.displayName, discount: parseInt(document.getElementById('s-discount').value)||0, items: items })
      }).then(res => res.json()).then(data => { alert(data.message); liff.closeWindow(); });
    }

    function addRestockRow() {
      const html = `<div class="item-card restock-item"><button class="remove-btn" onclick="this.parentElement.remove(); calcRestockTotal();">刪除</button><div class="row"><div class="col-product"><label>進貨商品</label><select class="r-name">${getOptionsHtml()}</select></div><div class="col-qty"><label>數量</label><input type="number" class="r-qty" value="1" inputmode="numeric" oninput="calcRestockTotal()"></div></div><label>進貨總成本</label><input type="number" class="r-cost" placeholder="輸入總成本" inputmode="numeric" oninput="calcRestockTotal()"></div>`;
      document.getElementById('restock-list').insertAdjacentHTML('beforeend', html);
    }

    function calcRestockTotal() {
      let total = 0;
      document.querySelectorAll('.restock-item').forEach(item => { total += parseInt(item.querySelector('.r-cost').value) || 0; });
      document.getElementById('restock-total-text').innerText = `儲存進貨 ($${total})`;
    }

    function submitRestock() {
      let items = [];
      document.querySelectorAll('.restock-item').forEach(item => {
        let name = item.querySelector('.r-name').value;
        let qty = parseInt(item.querySelector('.r-qty').value) || 0;
        let cost = parseInt(item.querySelector('.r-cost').value) || 0;
        if(name && qty > 0) items.push({ productName: name, qty: qty, cost: cost });
      });
      if (items.length === 0) return alert("請完整選擇進貨！");
      document.getElementById('restock-total-text').innerText = "處理中...";
      
      fetch(GAS_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, redirect: 'follow',
        body: JSON.stringify({ action: 'addRestock', uid: userProfile.userId, empName: userProfile.displayName, items: items })
      }).then(res => res.json()).then(data => { alert(data.message); liff.closeWindow(); });
    }

    // --- 計算並生成日期字串 ---
    function getDateRangeString(timeframe) {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');

      if (timeframe === 'day') {
        return `📅 今日：${y}/${m}/${d}`;
      } else if (timeframe === 'month') {
        return `📅 本月：${y}年${m}月`;
      } else if (timeframe === 'week') {
        const lastWeek = new Date(now.getTime() - 6 * 24 * 60 * 60 * 1000);
        const ly = lastWeek.getFullYear();
        const lm = String(lastWeek.getMonth() + 1).padStart(2, '0');
        const ld = String(lastWeek.getDate()).padStart(2, '0');
        return `📅 近七日：${ly}/${lm}/${ld} ~ ${m}/${d}`;
      }
    }

    // --- 動態生成不重複顏色的演算法 (黃金比例) ---
    function generateDistinctColors(count) {
      let colors = [];
      for (let i = 0; i < count; i++) {
        // 利用 137.5 度的黃金視角來確保每次生成的色相差最大，絕對不重複
        const hue = (i * 137.5) % 360; 
        colors.push(`hsl(${hue}, 70%, 65%)`);
      }
      return colors;
    }

    // --- 統計報表核心邏輯 ---
    let currentTimeframe = 'day';

    function loadStats(timeframe, btnElem) {
      currentTimeframe = timeframe;
      document.querySelectorAll('.stats-btn').forEach(btn => btn.classList.remove('active'));
      btnElem.classList.add('active');
      
      // 更新畫面的日期標題
      document.getElementById('stats-date-display').innerText = getDateRangeString(timeframe);
      document.getElementById('st-revenue').innerText = "讀取中";

      fetch(GAS_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, redirect: 'follow',
        body: JSON.stringify({ action: 'getStats', timeframe: timeframe })
      }).then(res => res.json()).then(res => {
        if(res.status === 'success') {
          renderCharts(res.data);
        }
      });
    }

    function renderCharts(data) {
      document.getElementById('st-revenue').innerText = `$ ${data.totalRevenue.toLocaleString()}`;
      document.getElementById('st-qty').innerText = data.totalQty;

      let labels = Object.keys(data.products);
      let revenues = labels.map(l => data.products[l].revenue);
      let qtys = labels.map(l => data.products[l].qty);

      // 動態生成顏色 (有幾個商品就生幾種顏色)
      const dynamicColors = generateDistinctColors(labels.length);

      // 銷毀舊圖表避免重疊
      if(pieChartInstance) pieChartInstance.destroy();
      if(barChartInstance) barChartInstance.destroy();
      if(horizontalBarChartInstance) horizontalBarChartInstance.destroy();

      // Chart.js 標籤字體設定 (放大版)
      const hugeFontConfig = { size: 26, weight: 'bold' };
      const safeTotalQty = data.totalQty || 1; // 避免除以 0

      // 1. 新增：橫向長條圖 (顯示百分比)
      const labelsWithPercent = labels.map((l, i) => {
        let percent = ((qtys[i] / safeTotalQty) * 100).toFixed(1);
        return `${l} (${percent}%)`;
      });

      const ctxHBar = document.getElementById('horizontalBarChart').getContext('2d');
      horizontalBarChartInstance = new Chart(ctxHBar, {
        type: 'bar',
        data: { 
          labels: labelsWithPercent, 
          datasets: [{ 
            data: qtys.map(q => (q / safeTotalQty * 100).toFixed(1)), 
            backgroundColor: dynamicColors, 
            borderRadius: 15 
          }] 
        },
        options: { 
          indexAxis: 'y', // 這行是把長條圖變成「橫向」的關鍵
          plugins: { legend: { display: false } },
          scales: { 
            x: { ticks: { font: hugeFontConfig } }, 
            y: { ticks: { font: hugeFontConfig } } 
          } 
        }
      });

      // 2. 圓餅圖 (營業額佔比)
      const ctxPie = document.getElementById('pieChart').getContext('2d');
      pieChartInstance = new Chart(ctxPie, {
        type: 'doughnut', 
        data: { labels: labels, datasets: [{ data: revenues, backgroundColor: dynamicColors }] },
        options: { plugins: { legend: { position: 'bottom', labels: { font: hugeFontConfig, padding: 20 } } } }
      });

      // 3. 直條圖 (數量統計)
      const ctxBar = document.getElementById('barChart').getContext('2d');
      barChartInstance = new Chart(ctxBar, {
        type: 'bar',
        data: { labels: labels, datasets: [{ label: '售出數量', data: qtys, backgroundColor: dynamicColors, borderRadius: 15 }] },
        options: { 
          scales: { 
            y: { beginAtZero: true, ticks: { stepSize: 1, font: hugeFontConfig } }, 
            x: { ticks: { font: hugeFontConfig } } 
          }, 
          plugins: { legend: { display: false } } 
        }
      });
    }
  </script>
</body>
</html>
