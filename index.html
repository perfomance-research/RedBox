<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>紅木盒帳務系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; background-color: #f4f5f7; height: 100vh; display: flex; flex-direction: column; }
    
    /* 頂部載入狀態 */
    #status-bar { text-align: center; padding: 12px; background: #fff3cd; color: #856404; font-size: 16px; font-weight: bold; display: none; }
    
    .tabs { display: flex; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); z-index: 10; flex-shrink: 0;}
    .tab { flex: 1; text-align: center; padding: 20px 0; font-weight: bold; color: #888; cursor: pointer; font-size: 18px; }
    .tab.active { color: #00B900; border-bottom: 4px solid #00B900; }
    
    .form-wrapper { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 40px; }
    .form-content { display: none; }
    .form-content.active { display: block; }
    
    .item-card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 3px 8px rgba(0,0,0,0.05); position: relative; border: 1px solid #eee; }
    .remove-btn { position: absolute; top: 10px; right: 10px; background: #ffebee; color: #d32f2f; border: none; border-radius: 6px; padding: 6px 12px; font-size: 14px; font-weight: bold; cursor: pointer; }
    
    label { font-size: 15px; color: #555; font-weight: bold; margin-bottom: 8px; display: block; }
    input, select { width: 100%; padding: 15px; margin-bottom: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 18px; background: #fafafa; }
    input:focus, select:focus { border-color: #00B900; outline: none; background: white; }
    
    /* 左邊商品，右邊數量排版 */
    .row { display: flex; gap: 10px; }
    .col-product { flex: 1.8; } 
    .col-qty { flex: 1; }     
    
    .add-row-btn { width: 100%; padding: 16px; background: transparent; color: #00B900; border: 2px dashed #00B900; border-radius: 12px; font-size: 18px; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
    .discount-box { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 3px 8px rgba(0,0,0,0.05); }
    
    .btn-submit { width: 100%; padding: 20px; background: #00B900; color: white; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
    .btn-submit.blue { background: #0066FF; }
    
    .loader { display: none; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; width: 22px; height: 22px; animation: spin 1s linear infinite; margin-left: 10px;}
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="status-bar">🔄 系統初始化中，請稍候...</div>

  <div class="tabs">
    <div class="tab active" id="tab-sales" onclick="switchTab('sales')">📦 銷售結帳</div>
    <div class="tab" id="tab-restock" onclick="switchTab('restock')">📥 進貨盤點</div>
  </div>

  <div class="form-wrapper">
    <!-- 銷售表單 -->
    <div class="form-content active" id="form-sales">
      <div id="sales-list">
        <div class="item-card sale-item">
          <div class="row">
            <div class="col-product">
              <label>商品名稱</label>
              <select class="s-name" onchange="autoFillPrice(this)">
                <option value="" disabled selected>請選擇...</option>
              </select>
            </div>
            <div class="col-qty">
              <label>數量</label>
              <input type="number" class="s-qty" value="1" inputmode="numeric" oninput="calcTotal()">
            </div>
          </div>
          <label>單件實售金額</label>
          <input type="number" class="s-price" placeholder="輸入單價" inputmode="numeric" oninput="calcTotal()">
        </div>
      </div>
      
      <button class="add-row-btn" onclick="addSaleRow()">＋ 新增另一項商品</button>

      <div class="discount-box">
        <label>整筆訂單總折扣 (若無則填 0)</label>
        <input type="number" id="s-discount" value="0" inputmode="numeric" oninput="calcTotal()" style="margin-bottom:0;">
      </div>

      <button class="btn-submit" id="btn-sales" onclick="submitSales()">
        <span id="sales-total-text">結帳 (總計 $0)</span>
        <div class="loader" id="loader-sales"></div>
      </button>
    </div>

    <!-- 進貨表單 -->
    <div class="form-content" id="form-restock">
      <div id="restock-list">
        <div class="item-card restock-item">
          <div class="row">
            <div class="col-product">
              <label>進貨商品</label>
              <select class="r-name">
                <option value="" disabled selected>請選擇...</option>
              </select>
            </div>
            <div class="col-qty">
              <label>數量</label>
              <input type="number" class="r-qty" value="1" inputmode="numeric" oninput="calcRestockTotal()">
            </div>
          </div>
          <label>進貨總成本</label>
          <input type="number" class="r-cost" placeholder="輸入總成本" inputmode="numeric" oninput="calcRestockTotal()">
        </div>
      </div>
      
      <button class="add-row-btn" onclick="addRestockRow()" style="color:#0066FF; border-color:#0066FF;">＋ 新增進貨品項</button>
      
      <button class="btn-submit blue" id="btn-restock" onclick="submitRestock()">
        <span id="restock-total-text">新增庫存 (總成本 $0)</span>
        <div class="loader" id="loader-restock"></div>
      </button>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbycPaOiDloK_fn_S8RLs7bo-sTU3OCQSFI2pyYbwxZzW5y9KAjQ-NNx6Fsbo1hYuKSsVg/exec'; 
    let userProfile = {};
    let globalProducts = []; 

    liff.init({ liffId: "2010757215-9etMXJlK" }).then(() => {
      if (liff.isLoggedIn()) { 
        liff.getProfile().then(profile => { 
          userProfile = profile; 
          initAppAndFetchProducts(); 
        }); 
      } else { 
        liff.login(); 
      }
    });

    // 初始化 App：破解 CORS 設定
    function initAppAndFetchProducts() {
      const statusBar = document.getElementById('status-bar');
      statusBar.style.display = 'block';

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 破解 CORS
        redirect: 'follow', // 允許轉址
        body: JSON.stringify({ 
          action: 'initApp',
          uid: userProfile.userId,
          empName: userProfile.displayName
        })
      })
      .then(res => res.json())
      .then(res => {
        statusBar.style.display = 'none';
        if (res.status === 'success') {
          globalProducts = res.products; 
          populateAllSelects(); 
        }
      })
      .catch(err => {
        statusBar.innerText = "❌ 無法連線，請確認 GAS 已部署為新版本";
        statusBar.style.background = "#f8d7da";
        statusBar.style.color = "#721c24";
      });
    }

    function getOptionsHtml() {
      let html = '<option value="" disabled selected>請選擇...</option>';
      globalProducts.forEach(p => {
        html += `<option value="${p.name}">${p.name}</option>`;
      });
      return html;
    }

    function populateAllSelects() {
      const optionsHtml = getOptionsHtml();
      document.querySelectorAll('.s-name, .r-name').forEach(select => {
        if (select.options.length <= 1) { 
          select.innerHTML = optionsHtml;
        }
      });
    }

    function autoFillPrice(selectElem) {
      const selectedName = selectElem.value;
      const product = globalProducts.find(p => p.name === selectedName);
      if (product) {
        const row = selectElem.closest('.item-card');
        row.querySelector('.s-price').value = product.price;
        calcTotal();
      }
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');
      document.getElementById(`form-${tabName}`).classList.add('active');
    }

    function addSaleRow() {
      const html = `
        <div class="item-card sale-item">
          <button class="remove-btn" onclick="this.parentElement.remove(); calcTotal();">刪除</button>
          <div class="row">
            <div class="col-product">
              <label>商品名稱</label>
              <select class="s-name" onchange="autoFillPrice(this)">${getOptionsHtml()}</select>
            </div>
            <div class="col-qty">
              <label>數量</label>
              <input type="number" class="s-qty" value="1" inputmode="numeric" oninput="calcTotal()">
            </div>
          </div>
          <label>單件實售金額</label>
          <input type="number" class="s-price" placeholder="輸入單價" inputmode="numeric" oninput="calcTotal()">
        </div>`;
      document.getElementById('sales-list').insertAdjacentHTML('beforeend', html);
    }

    function calcTotal() {
      let total = 0;
      document.querySelectorAll('.sale-item').forEach(item => {
        let qty = parseInt(item.querySelector('.s-qty').value) || 0;
        let price = parseInt(item.querySelector('.s-price').value) || 0;
        total += (qty * price);
      });
      let discount = parseInt(document.getElementById('s-discount').value) || 0;
      total -= discount;
      document.getElementById('sales-total-text').innerText = `結帳 (總計 $${Math.max(0, total)})`;
    }

    function submitSales() {
      let items = [];
      document.querySelectorAll('.sale-item').forEach(item => {
        let name = item.querySelector('.s-name').value;
        let qty = parseInt(item.querySelector('.s-qty').value) || 0;
        let price = parseInt(item.querySelector('.s-price').value) || 0;
        if(name && qty > 0) items.push({ productName: name, qty: qty, price: price });
      });

      if (items.length === 0) return alert("請至少完整選擇一項商品！");

      document.getElementById('sales-total-text').style.display = 'none';
      document.getElementById('loader-sales').style.display = 'block';

      const payload = {
        action: 'addSale',
        uid: userProfile.userId,
        empName: userProfile.displayName,
        discount: parseInt(document.getElementById('s-discount').value) || 0,
        items: items
      };
      postDataToGas(payload);
    }

    function addRestockRow() {
      const html = `
        <div class="item-card restock-item">
          <button class="remove-btn" onclick="this.parentElement.remove(); calcRestockTotal();">刪除</button>
          <div class="row">
            <div class="col-product">
              <label>進貨商品</label>
              <select class="r-name">${getOptionsHtml()}</select>
            </div>
            <div class="col-qty">
              <label>數量</label>
              <input type="number" class="r-qty" value="1" inputmode="numeric" oninput="calcRestockTotal()">
            </div>
          </div>
          <label>進貨總成本</label>
          <input type="number" class="r-cost" placeholder="輸入總成本" inputmode="numeric" oninput="calcRestockTotal()">
        </div>`;
      document.getElementById('restock-list').insertAdjacentHTML('beforeend', html);
    }

    function calcRestockTotal() {
      let total = 0;
      document.querySelectorAll('.restock-item').forEach(item => {
        total += parseInt(item.querySelector('.r-cost').value) || 0;
      });
      document.getElementById('restock-total-text').innerText = `新增庫存 (總成本 $${total})`;
    }

    function submitRestock() {
      let items = [];
      document.querySelectorAll('.restock-item').forEach(item => {
        let name = item.querySelector('.r-name').value;
        let qty = parseInt(item.querySelector('.r-qty').value) || 0;
        let cost = parseInt(item.querySelector('.r-cost').value) || 0;
        if(name && qty > 0) items.push({ productName: name, qty: qty, cost: cost });
      });

      if (items.length === 0) return alert("請至少完整選擇一項進貨！");
      document.getElementById('restock-total-text').style.display = 'none';
      document.getElementById('loader-restock').style.display = 'block';

      const payload = {
        action: 'addRestock',
        uid: userProfile.userId,
        empName: userProfile.displayName,
        items: items
      };
      postDataToGas(payload);
    }

    function postDataToGas(payload) {
      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 破解 CORS
        redirect: 'follow', // 允許轉址
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === 'success') {
          alert(data.message);
          liff.closeWindow(); 
        }
      });
    }
  </script>
</body>
</html>
