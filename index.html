<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>公司帳務系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* 全螢幕 APP 風格：移除所有邊距留白 */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background-color: #f4f5f7; height: 100vh; display: flex; flex-direction: column; }
    
    /* 頂部分頁按鈕 */
    .tabs { display: flex; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; flex-shrink: 0;}
    .tab { flex: 1; text-align: center; padding: 18px 0; font-weight: bold; color: #888; cursor: pointer; transition: 0.3s; font-size: 16px; }
    .tab.active { color: #00B900; border-bottom: 3px solid #00B900; }
    
    /* 滾動內容區 */
    .form-wrapper { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 30px; }
    .form-content { display: none; }
    .form-content.active { display: block; }
    
    /* 動態商品卡片設計 */
    .item-card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); position: relative; border: 1px solid #eee; }
    .remove-btn { position: absolute; top: 15px; right: 15px; background: #ffebee; color: #d32f2f; border: none; border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: bold; cursor: pointer; }
    
    label { font-size: 13px; color: #666; font-weight: bold; margin-bottom: 6px; display: block; }
    input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #fafafa; }
    input:focus { border-color: #00B900; outline: none; background: white; }
    
    /* 雙欄排版 (數量與單價並排) */
    .row { display: flex; gap: 10px; }
    .row .col { flex: 1; }
    
    /* 底部折扣與新增按鈕 */
    .add-row-btn { width: 100%; padding: 12px; background: transparent; color: #00B900; border: 2px dashed #00B900; border-radius: 12px; font-size: 16px; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
    .discount-box { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
    
    /* 大按鈕設計 */
    .btn-submit { width: 100%; padding: 18px; background: #00B900; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit.blue { background: #0066FF; }
    
    .loader { display: none; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- 頂部分頁 -->
  <div class="tabs">
    <div class="tab active" id="tab-sales" onclick="switchTab('sales')">📦 銷售記帳</div>
    <div class="tab" id="tab-restock" onclick="switchTab('restock')">📥 進貨盤點</div>
  </div>

  <div class="form-wrapper">
    <!-- 頁面 1：銷售表單 -->
    <div class="form-content active" id="form-sales">
      <div id="sales-list">
        <!-- 預設第一項商品 -->
        <div class="item-card sale-item">
          <label>商品名稱</label>
          <input type="text" class="s-name" list="productList" placeholder="選擇或輸入商品">
          <div class="row">
            <div class="col"><label>數量</label><input type="number" class="s-qty" value="1" inputmode="numeric" oninput="calcTotal()"></div>
            <div class="col"><label>單件金額</label><input type="number" class="s-price" placeholder="單價" inputmode="numeric" oninput="calcTotal()"></div>
          </div>
        </div>
      </div>
      
      <button class="add-row-btn" onclick="addSaleRow()">＋ 新增另一項商品</button>

      <div class="discount-box">
        <label>整筆訂單總折扣 (若無則填 0)</label>
        <input type="number" id="s-discount" value="0" inputmode="numeric" oninput="calcTotal()" style="margin-bottom:0;">
      </div>

      <button class="btn-submit" id="btn-sales" onclick="submitSales()">
        <span id="sales-total-text">結帳 (總計 $0)</span>
        <div class="loader" id="loader-sales"></div>
      </button>
    </div>

    <!-- 頁面 2：進貨表單 -->
    <div class="form-content" id="form-restock">
      <div id="restock-list">
        <!-- 預設第一項商品 -->
        <div class="item-card restock-item">
          <label>進貨商品名稱</label>
          <input type="text" class="r-name" list="productList" placeholder="選擇或輸入商品">
          <div class="row">
            <div class="col"><label>進貨數量</label><input type="number" class="r-qty" value="1" inputmode="numeric" oninput="calcRestockTotal()"></div>
            <div class="col"><label>總成本</label><input type="number" class="r-cost" placeholder="成本" inputmode="numeric" oninput="calcRestockTotal()"></div>
          </div>
        </div>
      </div>

      <button class="add-row-btn" onclick="addRestockRow()" style="color:#0066FF; border-color:#0066FF;">＋ 新增另一項進貨</button>

      <button class="btn-submit blue" id="btn-restock" onclick="submitRestock()">
        <span id="restock-total-text">新增庫存 (總成本 $0)</span>
        <div class="loader" id="loader-restock"></div>
      </button>
    </div>
  </div>

  <!-- 共用下拉選單 -->
  <datalist id="productList">
    <option value="拿鐵">
    <option value="美式">
  </datalist>

  <script>
    let userProfile = {};
    // 初始化 LIFF
    liff.init({ liffId: "2010757215-9etMXJlK" }).then(() => {
      if (liff.isLoggedIn()) { liff.getProfile().then(profile => { userProfile = profile; }); } else { liff.login(); }
    });

    // 切換分頁
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');
      document.getElementById(`form-${tabName}`).classList.add('active');
    }

    // --- 銷售區塊邏輯 ---
    function addSaleRow() {
      const html = `
        <div class="item-card sale-item">
          <button class="remove-btn" onclick="this.parentElement.remove(); calcTotal();">刪除</button>
          <label>商品名稱</label>
          <input type="text" class="s-name" list="productList" placeholder="選擇或輸入商品">
          <div class="row">
            <div class="col"><label>數量</label><input type="number" class="s-qty" value="1" inputmode="numeric" oninput="calcTotal()"></div>
            <div class="col"><label>單件金額</label><input type="number" class="s-price" placeholder="單價" inputmode="numeric" oninput="calcTotal()"></div>
          </div>
        </div>`;
      document.getElementById('sales-list').insertAdjacentHTML('beforeend', html);
    }

    // 即時計算銷售總金額
    function calcTotal() {
      let total = 0;
      document.querySelectorAll('.sale-item').forEach(item => {
        let qty = parseInt(item.querySelector('.s-qty').value) || 0;
        let price = parseInt(item.querySelector('.s-price').value) || 0;
        total += (qty * price);
      });
      let discount = parseInt(document.getElementById('s-discount').value) || 0;
      total -= discount;
      document.getElementById('sales-total-text').innerText = `確認結帳 (總計 $${Math.max(0, total)})`;
    }

    // 送出銷售資料
    function submitSales() {
      let items = [];
      document.querySelectorAll('.sale-item').forEach(item => {
        let name = item.querySelector('.s-name').value;
        let qty = parseInt(item.querySelector('.s-qty').value) || 0;
        let price = parseInt(item.querySelector('.s-price').value) || 0;
        if(name && qty > 0) items.push({ productName: name, qty: qty, price: price });
      });

      if (items.length === 0) return alert("請至少輸入一項商品！");

      document.getElementById('sales-total-text').style.display = 'none';
      document.getElementById('loader-sales').style.display = 'block';

      const payload = {
        action: 'addSale',
        uid: userProfile.userId || 'test',
        empName: userProfile.displayName || '員工',
        discount: parseInt(document.getElementById('s-discount').value) || 0,
        items: items
      };
      postDataToGas(payload);
    }

    // --- 進貨區塊邏輯 ---
    function addRestockRow() {
      const html = `
        <div class="item-card restock-item">
          <button class="remove-btn" onclick="this.parentElement.remove(); calcRestockTotal();">刪除</button>
          <label>進貨商品名稱</label>
          <input type="text" class="r-name" list="productList" placeholder="選擇或輸入商品">
          <div class="row">
            <div class="col"><label>進貨數量</label><input type="number" class="r-qty" value="1" inputmode="numeric" oninput="calcRestockTotal()"></div>
            <div class="col"><label>總成本</label><input type="number" class="r-cost" placeholder="成本" inputmode="numeric" oninput="calcRestockTotal()"></div>
          </div>
        </div>`;
      document.getElementById('restock-list').insertAdjacentHTML('beforeend', html);
    }

    function calcRestockTotal() {
      let total = 0;
      document.querySelectorAll('.restock-item').forEach(item => {
        total += parseInt(item.querySelector('.r-cost').value) || 0;
      });
      document.getElementById('restock-total-text').innerText = `新增庫存 (總成本 $${total})`;
    }

    function submitRestock() {
      let items = [];
      document.querySelectorAll('.restock-item').forEach(item => {
        let name = item.querySelector('.r-name').value;
        let qty = parseInt(item.querySelector('.r-qty').value) || 0;
        let cost = parseInt(item.querySelector('.r-cost').value) || 0;
        if(name && qty > 0) items.push({ productName: name, qty: qty, cost: cost });
      });

      if (items.length === 0) return alert("請至少輸入一項進貨！");

      document.getElementById('restock-total-text').style.display = 'none';
      document.getElementById('loader-restock').style.display = 'block';

      const payload = {
        action: 'addRestock',
        uid: userProfile.userId || 'test',
        empName: userProfile.displayName || '員工',
        items: items
      };
      postDataToGas(payload);
    }

    // --- 統一發送 API ---
    function postDataToGas(payload) {
      fetch('請替換成你的_GAS_WebAPP_URL', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === 'success') {
          alert(data.message);
          liff.closeWindow(); 
        }
      });
    }
  </script>
</body>
</html>
