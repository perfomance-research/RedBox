<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>公司帳務系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* 全螢幕 APP 風格：字體與元素全面放大 */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background-color: #f4f5f7; height: 100vh; display: flex; flex-direction: column; font-size: 18px; }
    
    /* 頂部分頁按鈕放大 */
    .tabs { display: flex; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); z-index: 10; flex-shrink: 0;}
    .tab { flex: 1; text-align: center; padding: 22px 0; font-weight: bold; color: #888; cursor: pointer; transition: 0.3s; font-size: 20px; }
    .tab.active { color: #00B900; border-bottom: 4px solid #00B900; }
    
    /* 滾動內容區 */
    .form-wrapper { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 40px; }
    .form-content { display: none; }
    .form-content.active { display: block; }
    
    /* 動態商品卡片設計 */
    .item-card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.06); position: relative; border: 1px solid #eee; }
    .remove-btn { position: absolute; top: 15px; right: 15px; background: #ffebee; color: #d32f2f; border: none; border-radius: 8px; padding: 8px 14px; font-size: 16px; font-weight: bold; cursor: pointer; }
    
    /* 標籤與輸入框全面放大 */
    label { font-size: 16px; color: #555; font-weight: bold; margin-bottom: 10px; display: block; }
    input { width: 100%; padding: 18px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 22px; background: #fafafa; font-weight: 500;}
    input:focus { border-color: #00B900; outline: none; background: white; }
    
    .row { display: flex; gap: 12px; }
    .row .col { flex: 1; }
    
    /* 底部按鈕放大 */
    .add-row-btn { width: 100%; padding: 18px; background: transparent; color: #00B900; border: 2px dashed #00B900; border-radius: 14px; font-size: 20px; font-weight: bold; margin-bottom: 25px; cursor: pointer; }
    .discount-box { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 25px; box-shadow: 0 3px 10px rgba(0,0,0,0.06); }
    
    .btn-submit { width: 100%; padding: 22px; background: #00B900; color: white; border: none; border-radius: 16px; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; }
    .btn-submit:active { transform: scale(0.96); }
    .btn-submit.blue { background: #0066FF; }
    
    .loader { display: none; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; width: 26px; height: 26px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 頂部載入狀態條 */
    #status-bar { text-align: center; padding: 8px; background: #fff3cd; color: #856404; font-size: 14px; font-weight: bold; display: none; }
  </style>
</head>
<body>

  <div id="status-bar">🔄 正在載入最新商品庫存...</div>

  <div class="tabs">
    <div class="tab active" id="tab-sales" onclick="switchTab('sales')">📦 銷售</div>
    <div class="tab" id="tab-restock" onclick="switchTab('restock')">📥 進貨</div>
  </div>

  <div class="form-wrapper">
    <!-- 銷售表單 -->
    <div class="form-content active" id="form-sales">
      <div id="sales-list">
        <div class="item-card sale-item">
          <label>商品名稱</label>
          <!-- 加入 onchange 自動帶入金額 -->
          <input type="text" class="s-name" list="productList" placeholder="選擇商品" onchange="autoFillPrice(this)">
          <div class="row">
            <div class="col"><label>數量</label><input type="number" class="s-qty" value="1" inputmode="numeric" oninput="calcTotal()"></div>
            <div class="col"><label>單件金額</label><input type="number" class="s-price" placeholder="單價" inputmode="numeric" oninput="calcTotal()"></div>
          </div>
        </div>
      </div>
      
      <button class="add-row-btn" onclick="addSaleRow()">＋ 新增另一項</button>

      <div class="discount-box">
        <label>整筆訂單折扣 (無則填 0)</label>
        <input type="number" id="s-discount" value="0" inputmode="numeric" oninput="calcTotal()" style="margin-bottom:0;">
      </div>

      <button class="btn-submit" id="btn-sales" onclick="submitSales()">
        <span id="sales-total-text">結帳 (總計 $0)</span>
        <div class="loader" id="loader-sales"></div>
      </button>
    </div>

    <!-- 進貨表單 -->
    <div class="form-content" id="form-restock">
      <div id="restock-list">
        <div class="item-card restock-item">
          <label>進貨商品名稱</label>
          <input type="text" class="r-name" list="productList" placeholder="選擇商品">
          <div class="row">
            <div class="col"><label>進貨數量</label><input type="number" class="r-qty" value="1" inputmode="numeric" oninput="calcRestockTotal()"></div>
            <div class="col"><label>總成本</label><input type="number" class="r-cost" placeholder="成本" inputmode="numeric" oninput="calcRestockTotal()"></div>
          </div>
        </div>
      </div>
      <button class="add-row-btn" onclick="addRestockRow()" style="color:#0066FF; border-color:#0066FF;">＋ 新增進貨品項</button>
      <button class="btn-submit blue" id="btn-restock" onclick="submitRestock()">
        <span id="restock-total-text">新增庫存 (總成本 $0)</span>
        <div class="loader" id="loader-restock"></div>
      </button>
    </div>
  </div>

  <!-- 動態商品選單會注入到這裡 -->
  <datalist id="productList"></datalist>

  <script>
    const GAS_URL = '請替換成你的_GAS_WebAPP_URL'; 
    let userProfile = {};
    let globalProducts = []; // 儲存從 Google Sheet 抓來的商品資料

    // 1. 初始化 LIFF
    liff.init({ liffId: "請替換成你的_LIFF_ID" }).then(() => {
      if (liff.isLoggedIn()) { 
        liff.getProfile().then(profile => { userProfile = profile; }); 
      } else { 
        liff.login(); 
      }
      // LIFF 啟動後，立刻去要商品資料
      fetchProductsFromSheet();
    });

    // 2. 從 Google Sheet 抓取最新商品
    function fetchProductsFromSheet() {
      const statusBar = document.getElementById('status-bar');
      statusBar.style.display = 'block';

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getProducts' })
      })
      .then(res => res.json())
      .then(res => {
        statusBar.style.display = 'none';
        if (res.status === 'success') {
          globalProducts = res.data; // 把資料存到全域變數
          const datalist = document.getElementById('productList');
          datalist.innerHTML = ''; // 清空舊的
          
          // 把 Google Sheet 裡的商品一個一個塞進 datalist
          globalProducts.forEach(item => {
            const option = document.createElement('option');
            option.value = item.name; // 例如：餅乾
            datalist.appendChild(option);
          });
        }
      })
      .catch(err => {
        statusBar.innerText = "❌ 讀取商品失敗，請檢查網路連線";
        statusBar.style.background = "#f8d7da";
        statusBar.style.color = "#721c24";
      });
    }

    // 3. 自動帶入金額 (當選擇商品時觸發)
    function autoFillPrice(inputElem) {
      const selectedName = inputElem.value;
      // 在我們存的 globalProducts 裡尋找這個商品
      const product = globalProducts.find(p => p.name === selectedName);
      
      if (product) {
        // 找到它所在的那個區塊，把價格塞進去
        const row = inputElem.closest('.item-card');
        const priceInput = row.querySelector('.s-price');
        priceInput.value = product.price; // 自動帶入 C 欄的價格
        calcTotal(); // 重新計算總計
      }
    }

    // --- 以下為 UI 邏輯 ---
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');
      document.getElementById(`form-${tabName}`).classList.add('active');
    }

    function addSaleRow() {
      const html = `
        <div class="item-card sale-item">
          <button class="remove-btn" onclick="this.parentElement.remove(); calcTotal();">刪除</button>
          <label>商品名稱</label>
          <input type="text" class="s-name" list="productList" placeholder="選擇商品" onchange="autoFillPrice(this)">
          <div class="row">
            <div class="col"><label>數量</label><input type="number" class="s-qty" value="1" inputmode="numeric" oninput="calcTotal()"></div>
            <div class="col"><label>單件金額</label><input type="number" class="s-price" placeholder="單價" inputmode="numeric" oninput="calcTotal()"></div>
          </div>
        </div>`;
      document.getElementById('sales-list').insertAdjacentHTML('beforeend', html);
    }

    function calcTotal() {
      let total = 0;
      document.querySelectorAll('.sale-item').forEach(item => {
        let qty = parseInt(item.querySelector('.s-qty').value) || 0;
        let price = parseInt(item.querySelector('.s-price').value) || 0;
        total += (qty * price);
      });
      let discount = parseInt(document.getElementById('s-discount').value) || 0;
      total -= discount;
      document.getElementById('sales-total-text').innerText = `結帳 (總計 $${Math.max(0, total)})`;
    }

    function submitSales() {
      let items = [];
      document.querySelectorAll('.sale-item').forEach(item => {
        let name = item.querySelector('.s-name').value;
        let qty = parseInt(item.querySelector('.s-qty').value) || 0;
        let price = parseInt(item.querySelector('.s-price').value) || 0;
        if(name && qty > 0) items.push({ productName: name, qty: qty, price: price });
      });

      if (items.length === 0) return alert("請至少輸入一項商品！");

      document.getElementById('sales-total-text').style.display = 'none';
      document.getElementById('loader-sales').style.display = 'block';

      const payload = {
        action: 'addSale',
        uid: userProfile.userId || 'test',
        empName: userProfile.displayName || '員工',
        discount: parseInt(document.getElementById('s-discount').value) || 0,
        items: items
      };
      postDataToGas(payload);
    }

    function addRestockRow() {
      const html = `
        <div class="item-card restock-item">
          <button class="remove-btn" onclick="this.parentElement.remove(); calcRestockTotal();">刪除</button>
          <label>進貨商品名稱</label>
          <input type="text" class="r-name" list="productList" placeholder="選擇商品">
          <div class="row">
            <div class="col"><label>進貨數量</label><input type="number" class="r-qty" value="1" inputmode="numeric" oninput="calcRestockTotal()"></div>
            <div class="col"><label>總成本</label><input type="number" class="r-cost" placeholder="成本" inputmode="numeric" oninput="calcRestockTotal()"></div>
          </div>
        </div>`;
      document.getElementById('restock-list').insertAdjacentHTML('beforeend', html);
    }

    function calcRestockTotal() {
      let total = 0;
      document.querySelectorAll('.restock-item').forEach(item => {
        total += parseInt(item.querySelector('.r-cost').value) || 0;
      });
      document.getElementById('restock-total-text').innerText = `新增庫存 (總成本 $${total})`;
    }

    function submitRestock() {
      let items = [];
      document.querySelectorAll('.restock-item').forEach(item => {
        let name = item.querySelector('.r-name').value;
        let qty = parseInt(item.querySelector('.r-qty').value) || 0;
        let cost = parseInt(item.querySelector('.r-cost').value) || 0;
        if(name && qty > 0) items.push({ productName: name, qty: qty, cost: cost });
      });

      if (items.length === 0) return alert("請至少輸入一項進貨！");
      document.getElementById('restock-total-text').style.display = 'none';
      document.getElementById('loader-restock').style.display = 'block';

      const payload = {
        action: 'addRestock',
        uid: userProfile.userId || 'test',
        empName: userProfile.displayName || '員工',
        items: items
      };
      postDataToGas(payload);
    }

    function postDataToGas(payload) {
      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === 'success') {
          alert(data.message);
          liff.closeWindow(); 
        }
      });
    }
  </script>
</body>
</html>
